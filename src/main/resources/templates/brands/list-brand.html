<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách thương hiệu</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Danh sách thương hiệu</h1>
<a th:href="@{/brands/add}">Thêm thương hiệu</a>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Tên</th>
        <th>Logo</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="brand : ${brands}">
        <td th:text="${brand.id}">ID</td>
        <td th:text="${brand.name}">Tên</td>
        <td>
            <img th:src="${brand.logo}" alt="Logo" width="100">
        </td>
        <td>
            <a th:href="@{/brands/edit/{id}(id=${brand.id})}">Chỉnh sửa</a>
            <a th:href="@{/brands/delete/{id}(id=${brand.id})}" onclick="return confirm('Are you sure you want to delete this brand?');">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>

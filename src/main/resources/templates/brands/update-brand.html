<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa thương hiệu</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Chỉnh sửa thương hiệu</h1>
<form th:action="@{/brands/edit/{id}(id=${brand.id})}" method="post" enctype="multipart/form-data" th:object="${brand}">
    <div>
        <label for="name">Tên:</label>
        <input type="text" id="name" th:field="*{name}" />
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Tên lỗi</div>
    </div>
    <div>
        <label for="logo">Logo:</label>
        <input type="file" id="logo" name="images" />
    </div>
    <div th:if="${errorMessage}">
        <p th:text="${errorMessage}">Lỗi tải lên hình ảnh</p>
    </div>
    <div>
        <button type="submit">Cập nhật</button>
    </div>
</form>
<a th:href="@{/brands}">Quay lại danh sách thương hiệu</a>
</body>
</html>
